<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayman Roshdy | Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #e9e9e9;
            --bg-phone: #000;
            --text-color: #fff;
            --btn-bg: #1c1c1c;
            --btn-border: #333;
        }

        body.light-mode {
            --bg-body: #d1d1d1;
            --bg-phone: #f4f4f4;
            --text-color: #000;
            --btn-bg: #fff;
            --btn-border: #ddd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg-body); }
        
        .phone { width: 100%; max-width: 350px; background: var(--bg-phone); border-radius: 40px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; }
        
        #theme-toggle { position: absolute; top: 25px; right: 30px; cursor: pointer; color: var(--text-color); font-size: 20px; }
        
        .profile { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; border: 3px solid var(--text-color); margin-bottom: 20px; }
        .profile img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { color: var(--text-color); font-size: 24px; margin-top: 5px; }
        
        /* الأيقونات الثلاثة العلوية: تبقى دائما بلون النص (text-color) */
        .top-icons { margin-top: 10px; display: flex; gap: 20px; margin-bottom: 30px; }
        .top-icons i { color: var(--text-color); font-size: 20px; opacity: 0.8; }
        
        .links { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        .link-button { background: var(--btn-bg); color: var(--text-color); padding: 16px; border-radius: 12px; text-align: center; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 10px; border: 1px solid var(--btn-border); font-weight: 500; }
        .link-button:hover { background: var(--text-color); color: var(--bg-phone); transform: scale(1.02); }

        /* الأيقونات داخل الأزرار فقط هي التي تتلون في الوضع الفاتح */
        body.light-mode .links .fa-whatsapp { color: #25D366 !important; }
        body.light-mode .links .fa-instagram { color: #E1306C !important; }
        body.light-mode .links .fa-tiktok { color: #000 !important; }
        body.light-mode .links .fa-threads { color: #000 !important; }
        body.light-mode .links .fa-x-twitter { color: #000 !important; }
    </style>
</head>
<body>
    <div class="phone">
        <i id="theme-toggle" class="fas fa-adjust"></i>
        
        <div class="profile">
            <img src="https://i.ibb.co/Y7CXgSc4/478314431-514563738354105-4253529793725933323-n.jpg" alt="Ayman Roshdy">
        </div>
        <h1>Ayman Roshdy</h1>
        
        <div class="top-icons">
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-x-twitter"></i>
            <i class="fa-brands fa-tiktok"></i>
        </div>
        
        <div class="links">
            <a class="link-button" href="https://wa.me/201553560401" target="_blank"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
            <a class="link-button" href="https://www.threads.net/@ayman__roshdy" target="_blank"><i class="fa-brands fa-threads"></i> Threads</a>
            <a class="link-button" href="https://www.instagram.com/ayman__roshdy" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
            <a class="link-button" href="https://x.com/Ayman__Roshdy" target="_blank"><i class="fa-brands fa-x-twitter"></i> X (Twitter)</a>
            <a class="link-button" href="https://www.tiktok.com/@ayman__roshdy" target="_blank"><i class="fa-brands fa-tiktok"></i> TikTok</a>
        </div>
    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        
        // التحقق من الحالة المحفوظة عند تحميل الصفحة
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        toggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            // حفظ الحالة في المتصفح
            if (document.body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
