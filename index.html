
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e9e9e9;
}

.phone{
    width:320px;
    height:600px;
    background:#000;
    border-radius:40px;
    padding:30px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.profile{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#444;
    margin-top:20px;
}

h1{
    color:#fff;
    font-size:20px;
    margin-top:15px;
}

/* 🔝 TOP ICONS (NOT clickable) */
.top-icons{
    margin-top:10px;
    display:flex;
    gap:20px;
}

.top-icons i{
    color:white;
    font-size:24px;
}

/* 🔻 BOTTOM LINKS (clickable) */
.links{
    width:100%;
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.link{
    background:#1c1c1c;
    color:white;
    padding:12px;
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    transition:0.3s;
}

.link:hover{
    background:#333;
}
</style>

</head>

<body>

<div class="phone">

    <div class="profile"></div>

    <h1>Ayman Roshdy</h1>

    <!-- 🔝 TOP (JUST SHAPE - NO LINKS) -->
    <div class="top-icons">

        <i class="fa-brands fa-instagram"></i>

        <i class="fa-brands fa-x-twitter"></i>

        <i class="fa-brands fa-tiktok"></i>

    </div>

    <!-- 🔻 BOTTOM (CLICKABLE) -->
    <div class="links">

        <a class="link" href="https://wa.me/21553560401" target="_blank">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>

        <a class="link" href="https://www.threads.net/@ayman__roshdy" target="_blank">
            <i class="fa-brands fa-threads"></i> Threads
        </a>

        <a class="link" href="https://www.instagram.com/ayman__roshdy" target="_blank">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>

        <a class="link" href="https://www.threads.com/@ayman__roshdy" target="_blank">
            <i class="fa-brands fa-x-twitter"></i> X (Twitter)
        </a>

        <a class="link" href="https://www.tiktok.com/@ayman__roshdy" target="_blank">
            <i class="fa-brands fa-tiktok"></i> TikTok
        </a>

    </div>

</div>

</body>
</html>
